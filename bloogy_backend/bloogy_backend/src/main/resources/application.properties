spring.application.name=bloogy

# Google OAuth configuration
app.oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
app.oauth.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
app.oauth.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:18080/login/oauth2/code/google}

# GCP / Firestore configuration
app.gcp.project-id=${GCP_PROJECT_ID:}
app.gcp.credentials.path=${GOOGLE_APPLICATION_CREDENTIALS:}

# Feature flags
app.features.pubsub-enabled=${APP_ENABLE_PUBSUB:false}
app.features.email-enabled=${APP_ENABLE_EMAIL:false}

# Pub/Sub configuration
app.pubsub.topic=${APP_PUBSUB_TOPIC:}
app.pubsub.subscription=${APP_PUBSUB_SUBSCRIPTION:}

# Email configuration
app.notification.email=${APP_NOTIFICATION_EMAIL:}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
